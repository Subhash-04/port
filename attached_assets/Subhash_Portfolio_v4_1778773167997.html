<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Subhash Mandalapu — Designer & Developer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper:    '#f4f1ea',
          paper2:   '#ebe6db',
          ink:      '#1a1a17',
          ink2:     '#2c2a25',
          muted:    '#6b6a63',
          line:     '#2c2a25',
          accent:   '#c64f17', // warm rust
          accent2:  '#f0a36c',
          olive:    '#5b6244',
        },
        fontFamily: {
          display: ['"Instrument Serif"', 'serif'],
          body:    ['Geist', 'Inter', 'sans-serif'],
          mono:    ['"Geist Mono"', 'ui-monospace', 'monospace'],
        }
      }
    }
  }
</script>

<style>
  :root {
    --paper:  #f4f1ea;
    --paper2: #ebe6db;
    --ink:    #1a1a17;
    --ink2:   #2c2a25;
    --muted:  #6b6a63;
    --accent: #c64f17;
    --olive:  #5b6244;
  }

  html, body { background: var(--paper); color: var(--ink); }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Faint paper grain */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='5'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
    opacity: 0.05; mix-blend-mode: multiply;
  }

  /* Type */
  .display { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.02em; line-height: 0.95; }
  .display em { font-style: italic; color: var(--accent); }
  .mono  { font-family: 'Geist Mono', monospace; }
  .eyebrow {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
  }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* Buttons */
  .btn-dark {
    background: var(--ink); color: var(--paper);
    border-radius: 999px; padding: 14px 26px;
    display: inline-flex; align-items: center; gap: 10px;
    transition: background 200ms ease, transform 200ms ease;
  }
  .btn-dark:hover { background: #000; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--ink); border-radius: 999px; padding: 13px 25px;
    display: inline-flex; align-items: center; gap: 10px;
    transition: background 200ms ease, color 200ms ease;
  }
  .btn-ghost:hover { background: var(--ink); color: var(--paper); }

  /* Status chip */
  .chip {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--paper2);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 999px; padding: 8px 14px;
    font-size: 13px; color: var(--ink2);
  }
  .dot { width: 8px; height: 8px; border-radius: 999px; background: #16a34a;
         box-shadow: 0 0 0 4px rgba(22,163,74,0.18); }
  .dot.pulse { animation: pulse 2.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.35) } }

  /* Section frame */
  .frame { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  @media (min-width: 768px) { .frame { padding: 0 40px; } }

  /* Divider line */
  .rule { height: 1px; background: rgba(0,0,0,0.12); width: 100%; }

  /* Project tile */
  .tile {
    position: relative; border-radius: 28px; overflow: hidden;
    background: var(--paper2);
    border: 1px solid rgba(0,0,0,0.06);
    transition: transform 320ms cubic-bezier(.2,.7,.2,1);
  }
  .tile:hover { transform: translateY(-4px); }
  .tile-cta {
    position: absolute; top: 22px; right: 22px;
    width: 44px; height: 44px; border-radius: 999px;
    background: rgba(255,255,255,0.92); color: var(--ink);
    display: grid; place-items: center;
    transition: transform 200ms ease, background 200ms ease;
    backdrop-filter: blur(6px);
  }
  .tile:hover .tile-cta { transform: rotate(-45deg); background: var(--ink); color: var(--paper); }

  /* Marquee */
  .marquee { overflow: hidden; position: relative; }
  .marquee-track {
    display: inline-flex; white-space: nowrap; gap: 64px;
    animation: marquee 38s linear infinite;
  }
  @keyframes marquee { from { transform: translateX(0) } to { transform: translateX(-50%) } }

  /* Avatar */
  .avatar {
    width: 56px; height: 56px; border-radius: 999px;
    background: linear-gradient(135deg, #d9c9b0 0%, #b0967a 100%);
    border: 2px solid var(--paper);
    box-shadow: 0 6px 20px -8px rgba(0,0,0,0.3);
    display: grid; place-items: center;
    font-family: 'Instrument Serif', serif;
    font-size: 22px; color: var(--ink);
    overflow: hidden;
  }

  /* Hero photo frame */
  .photo-frame {
    width: 100%; aspect-ratio: 4/5; border-radius: 28px;
    background:
      radial-gradient(60% 50% at 70% 30%, rgba(255,225,200,0.7), transparent 70%),
      linear-gradient(135deg, #d9c9b0 0%, #a78f74 100%);
    border: 1px solid rgba(0,0,0,0.08);
    overflow: hidden; position: relative;
  }
  .photo-grid {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.05) 0 8px, transparent 8px 16px);
  }

  /* Nav */
  .nav-shell { transition: background 250ms ease, box-shadow 250ms ease; }
  .nav-shell.scrolled {
    background: rgba(244, 241, 234, 0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
  }
  .nav-link {
    color: var(--ink2); transition: color 200ms ease; position: relative;
  }
  .nav-link:hover { color: var(--accent); }
  .nav-link.active { color: var(--ink); }

  /* Hero ornament — spinning sun (svg) */
  @keyframes slow-spin { from { transform: rotate(0) } to { transform: rotate(360deg) } }
  .slow-spin { animation: slow-spin 24s linear infinite; transform-origin: 50% 50%; }

  /* Project tags */
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 999px; padding: 5px 11px;
    font-family: 'Geist Mono', monospace; font-size: 10.5px;
    letter-spacing: 0.06em; color: var(--ink2);
  }

  /* Testimonial card */
  .quote-card {
    background: var(--paper2);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 24px; padding: 32px;
  }

  /* Form */
  .field {
    background: var(--paper2);
    border: 1px solid rgba(0,0,0,0.1);
    color: var(--ink);
    transition: border-color 200ms ease, background 200ms ease;
  }
  .field::placeholder { color: var(--muted); }
  .field:focus { outline: none; border-color: var(--ink); background: #fff; }

  /* Big footer wordmark */
  .footer-mark {
    font-family: 'Instrument Serif', serif;
    letter-spacing: -0.05em; line-height: 0.85;
    color: var(--ink);
  }

  /* Service row hover */
  .row {
    display: grid; grid-template-columns: 80px 1fr auto;
    align-items: center; gap: 24px;
    padding: 28px 0;
    border-top: 1px solid rgba(0,0,0,0.12);
    transition: padding 320ms ease;
  }
  .row:hover { padding-left: 8px; }
  .row-num { font-family: 'Geist Mono', monospace; font-size: 13px; color: var(--muted); }
  .row-title { font-family: 'Instrument Serif', serif; font-size: 36px; line-height: 1; }
  .row-arrow { color: var(--muted); transition: transform 220ms ease, color 220ms ease; }
  .row:hover .row-arrow { transform: translate(4px, -4px); color: var(--ink); }
  @media (max-width: 640px) {
    .row { grid-template-columns: 1fr auto; gap: 12px; padding: 22px 0; }
    .row-num { display: none; }
    .row-title { font-size: 28px; }
  }
</style>
</head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- ──── PROJECT THUMBNAIL SVGS (Framer-style flat illustrations) ──── -->
<script type="text/babel" data-presets="env,react">

window.ProjectArt = {
  dharani: () => (
    <svg viewBox="0 0 600 420" preserveAspectRatio="xMidYMid slice" className="absolute inset-0 w-full h-full">
      <defs>
        <linearGradient id="dh-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#e8c9a3"/><stop offset="100%" stopColor="#c89a72"/></linearGradient>
      </defs>
      <rect width="600" height="420" fill="url(#dh-bg)"/>
      {/* dashboard window */}
      <g transform="translate(80 70)">
        <rect width="440" height="280" rx="14" fill="#1a1a17"/>
        <circle cx="22" cy="22" r="5" fill="#f0a36c"/>
        <circle cx="42" cy="22" r="5" fill="#5b6244"/>
        <circle cx="62" cy="22" r="5" fill="#c64f17"/>
        <rect x="22" y="48" width="120" height="14" rx="3" fill="#f4f1ea"/>
        <rect x="22" y="70" width="200" height="6"  rx="2" fill="#6b6a63"/>
        {/* metric tiles */}
        <rect x="22"  y="100" width="120" height="76" rx="8" fill="#2c2a25"/>
        <rect x="154" y="100" width="120" height="76" rx="8" fill="#c64f17"/>
        <rect x="286" y="100" width="132" height="76" rx="8" fill="#2c2a25"/>
        <rect x="34"  y="115" width="70" height="6" rx="2" fill="#6b6a63"/>
        <rect x="34"  y="135" width="50" height="18" rx="3" fill="#f4f1ea"/>
        <rect x="166" y="115" width="70" height="6" rx="2" fill="rgba(255,255,255,0.7)"/>
        <rect x="166" y="135" width="60" height="18" rx="3" fill="#f4f1ea"/>
        <rect x="298" y="115" width="80" height="6" rx="2" fill="#6b6a63"/>
        <rect x="298" y="135" width="55" height="18" rx="3" fill="#f4f1ea"/>
        {/* chart */}
        <rect x="22" y="190" width="396" height="74" rx="8" fill="#2c2a25"/>
        <polyline points="36,250 80,232 124,238 168,212 212,222 256,198 300,210 344,188 388,200" fill="none" stroke="#f0a36c" strokeWidth="2.5"/>
        <polyline points="36,250 80,240 124,246 168,228 212,236 256,220 300,228 344,210 388,222" fill="none" stroke="#f4f1ea" strokeWidth="2" strokeOpacity="0.5"/>
      </g>
    </svg>
  ),

  spardha: () => (
    <svg viewBox="0 0 600 420" preserveAspectRatio="xMidYMid slice" className="absolute inset-0 w-full h-full">
      <defs>
        <radialGradient id="sp-bg" cx="50%" cy="40%" r="80%">
          <stop offset="0%" stopColor="#2a1a4a"/>
          <stop offset="60%" stopColor="#1a1133"/>
          <stop offset="100%" stopColor="#0a0820"/>
        </radialGradient>
      </defs>
      <rect width="600" height="420" fill="url(#sp-bg)"/>
      {/* stars */}
      {Array.from({length:55}).map((_,i)=>{
        const x = (i*37 + 13) % 600, y = (i*73 + 7) % 420, r = (i%4)*0.5 + 0.5;
        return <circle key={i} cx={x} cy={y} r={r} fill="#f4f1ea" opacity={0.3 + (i%5)*0.14}/>;
      })}
      {/* planet ring */}
      <ellipse cx="430" cy="180" rx="130" ry="14" fill="none" stroke="#f0a36c" strokeWidth="2" opacity="0.8"/>
      <circle cx="430" cy="180" r="56" fill="#c64f17"/>
      <circle cx="412" cy="166" r="8" fill="#f0a36c" opacity="0.6"/>
      <circle cx="446" cy="194" r="12" fill="#2a1a4a" opacity="0.6"/>
      {/* big text */}
      <text x="64" y="280" fontFamily="Instrument Serif, serif" fontSize="84" fill="#f4f1ea" letterSpacing="-3">Spardha</text>
      <text x="64" y="328" fontFamily="Geist Mono, monospace" fontSize="16" letterSpacing="6" fill="#f0a36c">TECH FEST · 2025</text>
      {/* shooting star */}
      <line x1="120" y1="80" x2="180" y2="60" stroke="#f4f1ea" strokeWidth="1.5" opacity="0.7"/>
      <circle cx="180" cy="60" r="2.5" fill="#f4f1ea"/>
    </svg>
  ),

  acm: () => (
    <svg viewBox="0 0 600 420" preserveAspectRatio="xMidYMid slice" className="absolute inset-0 w-full h-full">
      <defs>
        <linearGradient id="ac-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#5b6244"/><stop offset="100%" stopColor="#3a4030"/></linearGradient>
      </defs>
      <rect width="600" height="420" fill="url(#ac-bg)"/>
      {/* network */}
      <g stroke="#f0a36c" strokeOpacity="0.55" strokeWidth="1.2" fill="none">
        <line x1="100" y1="100" x2="300" y2="210"/>
        <line x1="300" y1="210" x2="500" y2="120"/>
        <line x1="300" y1="210" x2="480" y2="310"/>
        <line x1="300" y1="210" x2="130" y2="320"/>
        <line x1="100" y1="100" x2="500" y2="120"/>
        <line x1="130" y1="320" x2="480" y2="310"/>
        <line x1="380" y1="60"  x2="300" y2="210"/>
        <line x1="220" y1="370" x2="300" y2="210"/>
      </g>
      {[[100,100,12],[300,210,22],[500,120,14],[480,310,13],[130,320,10],[380,60,7],[220,370,8]].map(([x,y,r],i)=>(
        <g key={i}>
          <circle cx={x} cy={y} r={r+5} fill="#f0a36c" opacity="0.3"/>
          <circle cx={x} cy={y} r={r} fill="#f4f1ea"/>
          <circle cx={x} cy={y} r={r-3} fill="#c64f17"/>
        </g>
      ))}
      <text x="40" y="60" fontFamily="Geist Mono, monospace" fontSize="13" fill="#f4f1ea" opacity="0.75" letterSpacing="3">ACM · VVIT</text>
    </svg>
  ),

  qr: () => (
    <svg viewBox="0 0 600 420" preserveAspectRatio="xMidYMid slice" className="absolute inset-0 w-full h-full">
      <defs>
        <linearGradient id="qr-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#f0a36c"/><stop offset="100%" stopColor="#c64f17"/></linearGradient>
      </defs>
      <rect width="600" height="420" fill="url(#qr-bg)"/>
      <g transform="translate(200 60)">
        <rect width="200" height="200" rx="14" fill="#f4f1ea"/>
        <g fill="#1a1a17">
          <rect x="14" y="14" width="40" height="40" rx="4"/>
          <rect x="146" y="14" width="40" height="40" rx="4"/>
          <rect x="14" y="146" width="40" height="40" rx="4"/>
        </g>
        <g fill="#f4f1ea">
          <rect x="22" y="22" width="24" height="24" rx="2"/>
          <rect x="154" y="22" width="24" height="24" rx="2"/>
          <rect x="22" y="154" width="24" height="24" rx="2"/>
        </g>
        <g fill="#1a1a17">
          <rect x="28" y="28" width="12" height="12"/>
          <rect x="160" y="28" width="12" height="12"/>
          <rect x="28" y="160" width="12" height="12"/>
        </g>
        {Array.from({length: 18}).map((_,r)=>Array.from({length:18}).map((__,c)=>{
          const on = ((r*7 + c*13 + r*c) % 5) > 2;
          if (!on) return null;
          const x = 64 + c*8, y = 14 + r*8;
          if ((x<60 && y<60) || (x>=150 && y<60) || (x<60 && y>=150)) return null;
          if (x>200 || y>200) return null;
          return <rect key={`${r}-${c}`} x={x} y={y} width="6" height="6" fill="#1a1a17"/>;
        }))}
      </g>
      <text x="60" y="350" fontFamily="Instrument Serif, serif" fontSize="40" fill="#f4f1ea">scan · share · connect</text>
    </svg>
  ),

  roborift: () => (
    <svg viewBox="0 0 600 420" preserveAspectRatio="xMidYMid slice" className="absolute inset-0 w-full h-full">
      <defs>
        <linearGradient id="rr-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#1a1a17"/><stop offset="100%" stopColor="#2c2a25"/></linearGradient>
      </defs>
      <rect width="600" height="420" fill="url(#rr-bg)"/>
      {/* grid */}
      <g stroke="#c64f17" strokeOpacity="0.18" strokeWidth="1">
        {Array.from({length: 12}).map((_,i)=><line key={`v${i}`} x1={i*50} y1="0" x2={i*50} y2="420"/>)}
        {Array.from({length: 9}).map((_,i)=><line key={`h${i}`} x1="0" y1={i*50} x2="600" y2={i*50}/>)}
      </g>
      {/* robot */}
      <g transform="translate(220 110)">
        {/* antenna */}
        <line x1="80" y1="-20" x2="80" y2="10" stroke="#f0a36c" strokeWidth="3"/>
        <circle cx="80" cy="-26" r="6" fill="#c64f17"/>
        {/* head */}
        <rect x="20" y="10" width="120" height="100" rx="14" fill="#f4f1ea"/>
        <rect x="36" y="36" width="32" height="32" rx="6" fill="#1a1a17"/>
        <rect x="92" y="36" width="32" height="32" rx="6" fill="#1a1a17"/>
        <circle cx="52" cy="52" r="5" fill="#c64f17"/>
        <circle cx="108" cy="52" r="5" fill="#c64f17"/>
        <rect x="56" y="82" width="48" height="6" rx="3" fill="#1a1a17"/>
        {/* body */}
        <rect x="34" y="120" width="92" height="60" rx="12" fill="#c64f17"/>
        <circle cx="58" cy="150" r="5" fill="#f4f1ea"/>
        <circle cx="80" cy="150" r="5" fill="#f4f1ea"/>
        <circle cx="102" cy="150" r="5" fill="#f4f1ea"/>
      </g>
      <text x="40" y="380" fontFamily="Geist Mono, monospace" fontSize="13" fill="#f0a36c" letterSpacing="4">DEFEND · THE · ROBOT</text>
    </svg>
  ),

  echo: () => (
    <svg viewBox="0 0 600 420" preserveAspectRatio="xMidYMid slice" className="absolute inset-0 w-full h-full">
      <defs>
        <linearGradient id="et-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#5b6244"/><stop offset="100%" stopColor="#3a4030"/></linearGradient>
      </defs>
      <rect width="600" height="420" fill="url(#et-bg)"/>
      {/* ripple soundwaves */}
      <g fill="none" stroke="#f0a36c" strokeWidth="2">
        <circle cx="300" cy="210" r="50" opacity="0.95"/>
        <circle cx="300" cy="210" r="90" opacity="0.7"/>
        <circle cx="300" cy="210" r="135" opacity="0.5"/>
        <circle cx="300" cy="210" r="180" opacity="0.3"/>
      </g>
      {/* center node */}
      <circle cx="300" cy="210" r="22" fill="#c64f17" stroke="#f4f1ea" strokeWidth="3"/>
      {/* bars */}
      {[40,80,60,100,55,90,70].map((h,i)=>(
        <rect key={i} x={70 + i*22} y={210 - h/2} width="10" height={h} rx="5" fill="#f4f1ea" opacity="0.7"/>
      ))}
      {[60,100,55,90,70,80,40].map((h,i)=>(
        <rect key={i} x={400 + i*22} y={210 - h/2} width="10" height={h} rx="5" fill="#f4f1ea" opacity="0.7"/>
      ))}
      <text x="40" y="370" fontFamily="Instrument Serif, serif" fontSize="32" fill="#f4f1ea">echoes through the neural prison</text>
    </svg>
  ),
};

/* Spinning sun ornament for hero */
window.SunStar = ({ size = 120 }) => (
  <svg viewBox="0 0 120 120" width={size} height={size} className="slow-spin">
    <g fill="#1a1a17">
      <circle cx="60" cy="60" r="14"/>
      {Array.from({length: 12}).map((_,i)=>{
        const a = (i/12) * Math.PI * 2;
        const x1 = 60 + Math.cos(a) * 22, y1 = 60 + Math.sin(a) * 22;
        const x2 = 60 + Math.cos(a) * 56, y2 = 60 + Math.sin(a) * 56;
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#1a1a17" strokeWidth="4" strokeLinecap="round"/>;
      })}
    </g>
  </svg>
);

/* Asterisk used as bullet */
window.Asterisk = ({ size = 18, color = "#c64f17" }) => (
  <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round">
    <line x1="12" y1="3" x2="12" y2="21"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/>
    <line x1="18.4" y1="5.6" x2="5.6" y2="18.4"/>
  </svg>

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } }),
      { threshold: 0.12, rootMargin: "0px 0px -40px 0px" }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function useActiveSection() {
  const [active, setActive] = useState("");
  useEffect(() => {
    const ids = navItems.map((n) => n.href.slice(1));
    const onScroll = () => {
      const y = window.scrollY + window.innerHeight * 0.35;
      let cur = "";
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return active;
}

function ContactForm() {

    setState({sending:true,sent:false,error:""});

  };

    <form onSubmit={onSubmit} className="space-y-4">
      <div className="grid sm:grid-cols-2 gap-4">

        <div className="text-xs min-h-[20px]">
          {state.error && <span className="text-red-700">{state.error}</span>}
